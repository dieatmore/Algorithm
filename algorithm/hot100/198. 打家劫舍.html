  <body>
    <script>
      var rob = function (nums) {
        const n = nums.length;
        if (nums == null || n == 0) return 0;
        if (n == 1) return nums[0];
        let first = nums[0];
        let second = Math.max(first, nums[1]);
        for (let i = 2; i < n; i++) {
          [first, second] = [second, Math.max(first + nums[i], second)];
        }
        return second;
      };
    </script>
  </body>
