<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var numSquares = function (n) {
        const f = Array(n + 1).fill(0);
        for (let i = 1; i <= n; i++) {
          let minNumber = Infinity;
          for (let j = 1; j * j <= i; j++) {
            minNumber = Math.min(minNumber, f[i - j * j]);
          }
          f[i] = minNumber + 1;
        }
        return f[n];
      };
    </script>
  </body>
</html>
