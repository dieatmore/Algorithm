  <body>
    <script>
      var climbStairs = function (n) {
        let pre2 = 1,
          pre1 = 1;
        let ans = 1;
        for (let i = 2; i <= n; i++) {
          ans = pre1 + pre2;
          pre2 = pre1;
          pre1 = ans;
        }
        return ans;
      };
    </script>
