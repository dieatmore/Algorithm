  <body>
    <script>
      var canJump = function (nums) {
        let mx = 0;
        for (let i = 0; mx < nums.length - 1; i++) {
          if (i > mx) return false;
          else mx = Math.max(mx, i + nums[i]);
        }
        return true;
      };
    </script>
  </body>
